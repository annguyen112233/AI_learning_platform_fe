[build]
  # Thư mục chứa source code
  base = "."
  # Lệnh build
  command = "npm run build"
  # Thư mục output sau khi build (Vite mặc định là dist)
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ✅ SPA Redirect - React Router sẽ hoạt động đúng
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ✅ Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ✅ Cache tĩnh assets lâu dài (JS/CSS đã có hash)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
